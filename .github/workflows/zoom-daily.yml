name: Zoom Daily Brief & Dashboard Update

on:
  schedule:
    # 毎日 16:00 JST (= UTC 07:00) に実行
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      skip_post:
        description: 'true ならChatwork投稿をスキップ（テスト用）'
        required: false
        default: 'false'
      room_id_override:
        description: '投稿先 room_id 上書き（テスト用・空ならsecrets.CHATWORK_ROOM_ID）'
        required: false
        default: ''
      target_mode:
        description: '対象日（auto / today / tomorrow）'
        required: false
        default: 'auto'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install jpholiday

      - name: Install Japanese fonts (2026-05-18 文字化け対策)
        # GitHub Actions Ubuntu には日本語フォントがデフォルトで入っていない。
        # 入れないと Chrome headless スクショで日本語が □（豆腐）になる。
        # 5/12画像投稿化以降ずっと豆腐化していたのが 5/18 に発覚し追加。
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          fc-cache -fv

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Generate dashboard HTML
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          TZ: Asia/Tokyo
        run: python3 scripts/generate_dashboard.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add irodori-zoom-dashboard.html irodori-zoom-tomorrow.html
          if git diff --cached --quiet; then
            echo "差分なし → commitスキップ"
          else
            STAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            git commit -m "auto: Zoomダッシュボード更新 ($STAMP)"
            git push
            echo "✅ push完了"
          fi

      - name: Post brief image to Chatwork
        if: ${{ github.event.inputs.skip_post != 'true' }}
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          TZ: Asia/Tokyo
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.room_id_override }}" ]; then
            ARGS="$ARGS --room ${{ github.event.inputs.room_id_override }}"
          fi
          if [ "${{ github.event.inputs.target_mode }}" = "today" ]; then
            ARGS="$ARGS --today"
          elif [ "${{ github.event.inputs.target_mode }}" = "tomorrow" ]; then
            ARGS="$ARGS --tomorrow"
          fi
          python3 scripts/post_brief.py $ARGS
